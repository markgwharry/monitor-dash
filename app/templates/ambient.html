{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="/static/css/ambient.css">
{% endblock %}

{% block content %}
<div class="dashboard-ambient">
    <!-- Canvas for particle effects -->
    <canvas id="ambient-canvas"></canvas>

    <!-- Subtle info overlay -->
    <div class="ambient-info">
        <div class="ambient-clock-wrap">
            <span class="ambient-clock" id="ambient-clock">{{ data.time.current }}</span>
            <span class="ambient-temp" id="ambient-temp">{{ data.weather.temp }}°</span>
        </div>
    </div>

    <!-- Data for JS -->
    <div class="ambient-data"
         data-temp="{{ data.systems.indoor.temp }}"
         data-temp-outside="{{ data.weather.temp }}"
         data-humidity="{{ data.systems.indoor.humidity }}"
         data-condition="{{ data.weather.condition }}"
         data-air-quality="{{ data.systems.air_quality.pm25_label|lower }}"
         data-heating-on="{{ 'true' if data.systems.heating.status == 'heating' else 'false' }}"
         data-next-event-mins="{{ data.calendar.next_meeting.minutes_until if data.calendar.next_meeting else '' }}"
         style="display: none;">
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/ambient-art.js"></script>
{% endblock %}
